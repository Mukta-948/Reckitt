<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment - Question 2</title>

    <link rel="stylesheet" href="css/assessment.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="assessment-card">

    <img src="assets/logo.png" alt="Reckitt Logo" class="logo">

    <h1 class="title">Assessment</h1>

    <div class="progress-section">
        <div class="progress-bar">
            <div class="progress-fill" style="width:40%;"></div>
        </div>
        <span class="progress-text">2/5</span>
    </div>

    <div class="question-box">
        What color indicates danger in industrial safety signs?
    </div>

    <div class="options-grid">

        <button class="option">
            <span class="letter">A</span>
            <span class="option-text">Blue</span>
            <span class="checkmark">✓</span>
        </button>

        <button class="option selected">
            <span class="letter">B</span>
            <span class="option-text">Red</span>
            <span class="checkmark">✓</span>
        </button>

        <button class="option">
            <span class="letter">C</span>
            <span class="option-text">Green</span>
            <span class="checkmark">✓</span>
        </button>

        <button class="option">
            <span class="letter">D</span>
            <span class="option-text">Yellow</span>
            <span class="checkmark">✓</span>
        </button>

    </div>

    <div class="button-row">
        <button class="prev-btn" onclick="location.href='q1.html'">Previous</button>
        <button class="next-btn" onclick="location.href='q3.html'">Next</button>
    </div>

    <img src="assets/watermark.png" class="watermark" alt="">

</div>

</body>
</html>
