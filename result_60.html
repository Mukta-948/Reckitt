<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Result</title>

    <link rel="stylesheet" href="css/result_60.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="assessment-card result-card">

    <!-- Confetti -->
    <img src="assets/confetti.png" class="confetti" alt="">

    <!-- Logo -->
    <img src="assets/logo.png" alt="Reckitt Logo" class="logo result-logo">

    <!-- Result Text -->
    <h2 class="result-title">NEEDS IMPROVEMENT</h2>

    <h1 class="score-heading">You’ve scored</h1>

    <div class="score-value">60%</div>

    <p class="result-message">
       Unfortunately, you did not pass this quiz.<br>
    </p>

    <button class="result-btn">
        Print Gate Pass
    </button>

    <!-- Watermark -->
    <img src="assets/watermark.png" class="watermark" alt="">

</div>

</body>
</html>
