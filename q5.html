<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assessment - Question 5</title>

<link rel="stylesheet" href="css/assessment.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="assessment-card">

<img src="assets/logo.png" class="logo">

<h1 class="title">Assessment</h1>

<div class="progress-section">
    <div class="progress-bar">
        <div class="progress-fill" style="width:100%;"></div>
    </div>
    <span class="progress-text">5/5</span>
</div>

<div class="question-box">
    What should you do if you notice an unsafe condition?
</div>

<div class="options-grid">

<button class="option">
<span class="letter">A</span>
<span class="option-text">Ignore it</span>
<span class="checkmark">✓</span>
</button>

<button class="option selected">
<span class="letter">B</span>
<span class="option-text">Report it immediately</span>
<span class="checkmark">✓</span>
</button>

<button class="option">
<span class="letter">C</span>
<span class="option-text">Wait for someone else</span>
<span class="checkmark">✓</span>
</button>

<button class="option">
<span class="letter">D</span>
<span class="option-text">Leave without informing anyone</span>
<span class="checkmark">✓</span>
</button>

</div>

<div class="button-row">
<button class="prev-btn" onclick="location.href='q4.html'">Previous</button>
<button class="next-btn" onclick="location.href='result.html'">Finish</button>
</div>

<img src="assets/watermark.png" class="watermark">

</div>

</body>
</html>
