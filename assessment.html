<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment</title>

    <link rel="stylesheet" href="css/assessment.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="assessment-card">

    <img src="assets/logo.png" alt="Reckitt Logo" class="logo">

    <h1 class="title">Assessment</h1>

    <div class="progress-section">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <span class="progress-text">1/5</span>
    </div>

    <div class="question-box">
        What should you wear to protect your head in the plant?
    </div>

    <div class="options-grid">

        <button class="option selected">
            <span class="letter">A</span>
            <span class="option-text">Helmet</span>
            <span class="checkmark">✓</span>
        </button>

        <button class="option">
            <span class="letter">B</span>
            <span class="option-text">Cap</span>
            <span class="checkmark">✓</span>
        </button>

        <button class="option">
            <span class="letter">C</span>
            <span class="option-text">Scarf</span>
            <span class="checkmark">✓</span>
        </button>

        <button class="option">
            <span class="letter">D</span>
            <span class="option-text">Sunglasses</span>
            <span class="checkmark">✓</span>
        </button>

    </div>

    <div class="button-row">

        <button class="prev-btn" disabled>
            Previous
        </button>

        <button class="next-btn">
            Next
        </button>

    </div>

    <img src="assets/watermark.png" class="watermark" alt="">

</div>

<script>

const options = document.querySelectorAll('.option');

options.forEach(option => {

    option.addEventListener('click', () => {

        options.forEach(opt => {
            opt.classList.remove('selected');
        });

        option.classList.add('selected');

    });

});

</script>

</body>
</html>
