<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate Pass</title>

    <link rel="stylesheet" href="css/pass.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="pass-card">

        <!-- Logo -->
        <img src="assets/logo.png" alt="Reckitt Logo" class="logo result-logo">

        <!-- Title -->
        <h2 class="gate-pass-title">Gate Pass</h2>

        <!-- Employee Information -->
        <div class="employee-details">

            <h1 class="employee-name">
                Arun Kumar
            </h1>

            <h3 class="designation">
                Plant Operator
            </h3>

            <h3 class="contact">
                +91 9999 99 0000
            </h3>

        </div>

        <!-- QR Code -->
        <div class="qr-code">
            <img src="assets/qr-code.png" alt="QR Code">
        </div>

        <!-- Bottom Watermark -->
        <img src="assets/watermark.png" alt="" class="watermark">

    </div>

</body>
</html>
