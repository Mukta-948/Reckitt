<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment</title>

    <link rel="stylesheet" href="css/assessment.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="assessment-card">

    <img src="assets/logo.png" alt="Reckitt Logo" class="logo">

    <h1 class="title">Assessment</h1>

    <div class="progress-section">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <span class="progress-text">1/5</span>
    </div>

    <div class="question-box">
        What should you wear to protect your head in the plant?
    </div>

    <div class="options-grid">

        <button class="option" data-correct="false">
    <span class="option-text">Safety Shoes</span>
</button>

<button class="option" data-correct="true">
    <span class="option-text">Helmet</span>
</button>

<button class="option" data-correct="false">
    <span class="option-text">Gloves</span>
</button>

<button class="option" data-correct="false">
    <span class="option-text">Goggles</span>
</button>

    </div>

    <div class="button-row">

        <button class="prev-btn" disabled>
            Previous
        </button>

        <button class="next-btn" id="nextBtn" disabled>
    Next
</button>

    </div>

    <img src="assets/watermark.png" class="watermark" alt="">

</div>

<script>
const options = document.querySelectorAll(".option");
const nextBtn = document.getElementById("nextBtn");

let answered = false;

options.forEach(option => {

    option.addEventListener("click", () => {

        if (answered) return;

        answered = true;

        const isCorrect =
            option.dataset.correct === "true";

        if (isCorrect) {
            option.classList.add("correct");
        } else {
            option.classList.add("wrong");
        }

        localStorage.setItem(
            "q1Answer",
            isCorrect ? "correct" : "wrong"
        );

        nextBtn.disabled = false;

    });

});

nextBtn.addEventListener("click", () => {
    window.location.href = "q2.html";
});
</script>

</body>
</html>
